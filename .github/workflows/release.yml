name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
          - os: windows-2022
            label: Windows
          - os: ubuntu-22.04
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Build distributables
        run: npm run dist -- --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*-mac.zip" \) -exec cp {} release-assets/ \;
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            find dist -maxdepth 1 -type f \( -name "*.exe" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            find dist -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          fi
          ls -la release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-build
          path: release-assets/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: release-assets/*
